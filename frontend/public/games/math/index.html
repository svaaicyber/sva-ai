<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #121212; border: 2px solid #eab308; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 0 30px rgba(234, 179, 8, 0.2); width: 300px; }
        h1 { font-size: 48px; color: #eab308; margin: 20px 0; font-family: 'Fira Code', monospace; }
        .btns { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        button { flex: 1; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-t { background: #10b981; color: #000; }
        .btn-f { background: #ef4444; color: #fff; }
        button:active { transform: scale(0.9); }
        .timer { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 30px; }
        .bar { height: 100%; background: #eab308; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <div style="color:#a1a1aa; font-weight:bold;">SCORE: <span id="score" style="color:#fff">0</span></div>
        <h1 id="eq">3 + 5 = 8</h1>
        <div class="btns">
            <button class="btn-t" onclick="answer(true)">TRUE</button>
            <button class="btn-f" onclick="answer(false)">FALSE</button>
        </div>
        <div class="timer"><div class="bar" id="bar"></div></div>
    </div>
    <script>
        let score = 0, isCorrect = true, timeLeft = 100, interval;

        function generate() {
            let a = Math.floor(Math.random() * 20) + 1;
            let b = Math.floor(Math.random() * 20) + 1;
            isCorrect = Math.random() > 0.5;
            let ans = isCorrect ? (a + b) : (a + b + Math.floor(Math.random() * 5) + 1);
            document.getElementById('eq').innerText = `${a} + ${b} = ${ans}`;
            timeLeft = 100;
            clearInterval(interval);
            interval = setInterval(() => {
                timeLeft -= 1;
                document.getElementById('bar').style.width = timeLeft + "%";
                if(timeLeft <= 0) gameOver();
            }, 30); // Speed of timer
        }

        function answer(guess) {
            if (guess === isCorrect) {
                score += 10;
                document.getElementById('score').innerText = score;
                generate();
            } else {
                gameOver();
            }
        }

        function gameOver() {
            clearInterval(interval);
            document.getElementById('eq').innerText = "GAME OVER";
            setTimeout(() => window.parent.postMessage({ type: 'GAME_OVER', coins: score }, '*'), 1000);
        }

        generate();
    </script>
</body>
</html>
