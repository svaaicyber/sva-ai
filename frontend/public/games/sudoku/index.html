<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; }
        h2 { color: #3b82f6; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        
        .board { display: grid; grid-template-columns: repeat(9, 30px); grid-template-rows: repeat(9, 30px); gap: 2px; background: #3b82f6; border: 2px solid #3b82f6; border-radius: 4px; padding: 2px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .cell { background: #121212; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; color: #a1a1aa; }
        .cell.fixed { color: #fff; background: #1e1e24; cursor: not-allowed; }
        .cell.selected { background: #06b6d4; color: #000; }
        .cell.error { color: #ef4444; text-shadow: 0 0 5px #ef4444; }
        
        /* 3x3 Grid Separation */
        .cell:nth-child(3n) { margin-right: 2px; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { margin-bottom: 2px; }

        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 30px; }
        .key { background: #27272a; border: 1px solid #3f3f46; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .key:active { background: #3b82f6; color: #fff; }
    </style>
</head>
<body>
    <h2>Sudoku Core</h2>
    <div class="board" id="board"></div>
    
    <div class="keypad">
        <div class="key" onclick="inputNum(1)">1</div>
        <div class="key" onclick="inputNum(2)">2</div>
        <div class="key" onclick="inputNum(3)">3</div>
        <div class="key" onclick="inputNum(4)">4</div>
        <div class="key" onclick="inputNum(5)">5</div>
        <div class="key" onclick="inputNum(6)">6</div>
        <div class="key" onclick="inputNum(7)">7</div>
        <div class="key" onclick="inputNum(8)">8</div>
        <div class="key" onclick="inputNum(9)">9</div>
        <div class="key" onclick="inputNum('')">X</div>
    </div>

    <script>
        // A solved valid board
        const solution = [
            5,3,4,6,7,8,9,1,2,
            6,7,2,1,9,5,3,4,8,
            1,9,8,3,4,2,5,6,7,
            8,5,9,7,6,1,4,2,3,
            4,2,6,8,5,3,7,9,1,
            7,1,3,9,2,4,8,5,6,
            9,6,1,5,3,7,2,8,4,
            2,8,7,4,1,9,6,3,5,
            3,4,5,2,8,6,1,7,9
        ];
        
        let currentBoard = [...solution];
        let selectedIndex = -1;
        let emptyCellsCount = 20; // Difficulty

        // Punch holes
        for(let i=0; i<emptyCellsCount; i++) {
            let r;
            do { r = Math.floor(Math.random() * 81); } while(currentBoard[r] === "");
            currentBoard[r] = "";
        }

        const boardDiv = document.getElementById("board");

        function drawBoard() {
            boardDiv.innerHTML = "";
            currentBoard.forEach((val, i) => {
                let cell = document.createElement("div");
                cell.className = `cell ${solution[i] === val ? 'fixed' : ''} ${i === selectedIndex ? 'selected' : ''}`;
                if (val !== "" && solution[i] !== val) cell.classList.add("error");
                cell.innerText = val;
                
                if (solution[i] !== val || val === "") {
                    cell.onclick = () => { selectedIndex = i; drawBoard(); };
                }
                boardDiv.appendChild(cell);
            });
        }

        function inputNum(num) {
            if (selectedIndex === -1) return;
            currentBoard[selectedIndex] = num;
            drawBoard();
            checkWin();
        }

        function checkWin() {
            if (currentBoard.join("") === solution.join("")) {
                document.querySelector("h2").innerText = "SYSTEM CRACKED!";
                setTimeout(() => window.parent.postMessage({ type: 'GAME_OVER', coins: 200 }, '*'), 1500);
            }
        }

        drawBoard();
    </script>
</body>
</html>
