<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; touch-action: none; }
        h2 { color: #f97316; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .score-board { margin-bottom: 20px; font-family: 'Fira Code', monospace; color: #a1a1aa; }
        #score { color: #f97316; font-size: 24px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 70px); grid-template-rows: repeat(4, 70px); gap: 10px; background: #121212; padding: 10px; border-radius: 12px; border: 2px solid #27272a; box-shadow: 0 0 30px rgba(249, 115, 22, 0.15); }
        .cell { background: #1e1e24; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #fff; transition: 0.1s; }
        
        /* Premium Neon Colors for Tiles */
        .val-2 { background: #27272a; color: #a1a1aa; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }
        .val-4 { background: #3f3f46; color: #fff; }
        .val-8 { background: #ca8a04; box-shadow: 0 0 10px #ca8a04; }
        .val-16 { background: #ea580c; box-shadow: 0 0 15px #ea580c; }
        .val-32 { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .val-64 { background: #e11d48; box-shadow: 0 0 15px #e11d48; }
        .val-128 { background: #a855f7; box-shadow: 0 0 20px #a855f7; font-size: 20px; }
        .val-256 { background: #8b5cf6; box-shadow: 0 0 20px #8b5cf6; font-size: 20px; }
        .val-512 { background: #6366f1; box-shadow: 0 0 20px #6366f1; font-size: 20px; }
        .val-1024 { background: #06b6d4; box-shadow: 0 0 25px #06b6d4; font-size: 16px; }
        .val-2048 { background: #10b981; box-shadow: 0 0 30px #10b981; font-size: 16px; text-shadow: 0 0 5px #fff; }

        @media (max-width: 400px) { .grid { grid-template-columns: repeat(4, 60px); grid-template-rows: repeat(4, 60px); } }
    </style>
</head>
<body>
    <h2>Quantum 2048</h2>
    <div class="score-board">SCORE: <span id="score">0</span></div>
    <div class="grid" id="grid"></div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;

        function init() { addRandom(); addRandom(); updateUI(); }

        function addRandom() {
            let empty = [];
            board.forEach((val, i) => { if (val === 0) empty.push(i); });
            if (empty.length > 0) {
                let r = empty[Math.floor(Math.random() * empty.length)];
                board[r] = Math.random() > 0.9 ? 4 : 2;
            }
        }

        function updateUI() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            board.forEach(val => {
                let cell = document.createElement("div");
                cell.className = `cell val-${val}`;
                cell.innerText = val > 0 ? val : "";
                grid.appendChild(cell);
            });
            document.getElementById("score").innerText = score;
        }

        function slide(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2; score += arr[i]; arr.splice(i + 1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(dir) {
            let oldBoard = [...board];
            for (let i = 0; i < 4; i++) {
                let row;
                if (dir === 'L') row = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]];
                if (dir === 'R') row = [board[i*4+3], board[i*4+2], board[i*4+1], board[i*4]];
                if (dir === 'U') row = [board[i], board[i+4], board[i+8], board[i+12]];
                if (dir === 'D') row = [board[i+12], board[i+8], board[i+4], board[i]];
                
                row = slide(row);
                
                if (dir === 'L') [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]] = row;
                if (dir === 'R') [board[i*4+3], board[i*4+2], board[i*4+1], board[i*4]] = row;
                if (dir === 'U') [board[i], board[i+4], board[i+8], board[i+12]] = row;
                if (dir === 'D') [board[i+12], board[i+8], board[i+4], board[i]] = row;
            }
            if (oldBoard.toString() !== board.toString()) { addRandom(); updateUI(); checkGameOver(); }
        }

        function checkGameOver() {
            if (!board.includes(0)) {
                let canMove = false;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (board[i*4+j] == board[i*4+j+1] || board[j*4+i] == board[(j+1)*4+i]) canMove = true;
                    }
                }
                if (!canMove) {
                    let earnedCoins = Math.min(150, Math.floor(score / 20));
                    setTimeout(() => window.parent.postMessage({ type: 'GAME_OVER', coins: earnedCoins }, '*'), 1000);
                }
            }
        }

        // Key Controls
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") move('L');
            if (e.key === "ArrowRight") move('R');
            if (e.key === "ArrowUp") move('U');
            if (e.key === "ArrowDown") move('D');
        });

        // Swipe Controls for Mobile
        let touchX = 0, touchY = 0;
        document.addEventListener('touchstart', e => { touchX = e.changedTouches[0].screenX; touchY = e.changedTouches[0].screenY; });
        document.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].screenX - touchX;
            let dy = e.changedTouches[0].screenY - touchY;
            if (Math.abs(dx) > Math.abs(dy)) { if (dx > 30) move('R'); else if (dx < -30) move('L'); } 
            else { if (dy > 30) move('D'); else if (dy < -30) move('U'); }
        });

        init();
    </script>
</body>
</html>
